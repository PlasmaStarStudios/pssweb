<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <title>Login | PlasmaStarStudios</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }
        form {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            width: 320px;
            border-left: 5px solid #722a9e;
        }
        h2 { color: #b366ff; margin-top: 0; font-size: 1.5em; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #722a9e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        input[type="submit"]:hover { background-color: #8e3bc4; }
        .message { margin-top: 15px; color: #4CAF50; font-size: 0.9em; }
        .error { margin-top: 15px; color: #ff4d4d; font-size: 0.9em; }
        
        .google-btn {
            background-color: #fff;
            color: #000;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            box-sizing: border-box;
        }
        .google-btn img { margin-right: 10px; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>Welcome</h2>
        <label for="email">Email</label>
        <input type="email" id="email" required>
        
        <label for="password">Password</label>
        <input type="password" id="password" required>
        
        <input type="submit" id="submitBtn" value="Login / Sign Up">
        
        <div id="googleSignInBtn" class="google-btn">
            <img src="https://registry.npmmirror.com/@lobehub/icons-static-png/latest/files/dark/google-color.png" alt="Google" width="20">
            <span>Continue with Google</span>
        </div>

        <p id="message" class="message"></p>
        <p id="error" class="error"></p>
    </form>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnUk38Kg2J0-_rHHnUSgi4ii9wkiihVHs",
            authDomain: "personal-accouts.firebaseapp.com",
            projectId: "personal-accouts",
            storageBucket: "personal-accouts.appspot.com",
            messagingSenderId: "190954179485",
            appId: "1:190954179485:web:ca7dec861890a6470c7d74"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const mockApiUrl = "https://670968a0af1a3998baa16e22.mockapi.io/pspninf/personalaccounts";

        // --- Logic: Check if user exists, if not, CREATE them ---
        async function handleUserData(firebaseUser) {
            document.getElementById('message').textContent = "Authenticating with database...";
            
            try {
                const response = await fetch(mockApiUrl);
                const users = await response.json();
                let mockUser = users.find(u => u.UserID === firebaseUser.uid);

                if (!mockUser) {
                    document.getElementById('message').textContent = "Creating new account...";
                    // Auto-register in MockAPI
                    const newUserData = {
                        UserID: firebaseUser.uid,
                        ProfileName: firebaseUser.displayName || firebaseUser.email.split('@')[0],
                        contactemail: firebaseUser.email,
                        Gender: "Not Specified",
                        Age: "N/A",
                        Subscriptions: "" // Empty by default
                    };

                    const createResponse = await fetch(mockApiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newUserData)
                    });
                    mockUser = await createResponse.json();
                }

                // Log them in locally
                localStorage.setItem("CurrentLoggedInUSERID", mockUser.UserID);
                document.getElementById('message').textContent = 'Success! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'https://plasmastarstudios.github.io/gawioghsaioghwaihfiohowiahgoiawrtioasygajklbnmz-nfklahwgioahiosygiouy9201571285-512895172895-857pss/Account/Consumer/';
                }, 1500);

            } catch (err) {
                document.getElementById('error').textContent = "Database Error: " + err.message;
            }
        }

        // --- Google Login/Signup ---
        document.getElementById('googleSignInBtn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(result => handleUserData(result.user))
                .catch(err => document.getElementById('error').textContent = err.message);
        });

        // --- Email Login/Signup ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.value = "Processing...";

            try {
                // Try logging in first
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                handleUserData(userCredential.user);
            } catch (error) {
                // If user doesn't exist in Firebase, create them in Firebase
                if (error.code === 'auth/user-not-found') {
                    try {
                        const newCredential = await auth.createUserWithEmailAndPassword(email, password);
                        handleUserData(newCredential.user);
                    } catch (signUpError) {
                        document.getElementById('error').textContent = signUpError.message;
                        btn.disabled = false;
                        btn.value = "Login / Sign Up";
                    }
                } else {
                    document.getElementById('error').textContent = error.message;
                    btn.disabled = false;
                    btn.value = "Login / Sign Up";
                }
            }
        });
    </script>
    <script src="../../../topbar.js"></script>
</body>
</html>
