<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Account | PlasmaStarStudios</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* --- ORIGINAL CONSUMER STYLE (DO NOT CHANGE) --- */
        body { background-color: #1a1a1a; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .content-wrapper { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .settings-link-container { text-align: right; margin-bottom: 10px; }
        .settings-link-container a { color: #b366ff; text-decoration: none; font-size: 0.9em; font-weight: bold; }
        .settings-link-container a:hover { text-decoration: underline; }

        .snippet-container {
            background-color: #262626;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 5px solid #722a9e;
        }
        .snippet-header {
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            color: #b366ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        /* --- UPDATED SUBSCRIPTION CARD STYLE --- */
        .card-container { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 20px; }
        .card {
            background: #333; border-radius: 12px; width: 300px;
            border: 1px solid #444; overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: #b366ff; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #b366ff; font-size: 1.1em; }
        
        /* Modernized Buttons within the Card */
        .sub-btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .sub-btn {
            background: #444; border: 1px solid #555; color: white;
            padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8em;
            transition: 0.2s;
        }
        .sub-btn:hover:not(:disabled) { background: #505050; border-color: #b366ff; }
        .sub-btn.active { background: #722a9e; border-color: #b366ff; }
        .sub-btn.unsubscribe { background: transparent; border: none; color: #ff5555; text-decoration: underline; }
        
        .status-text { font-size: 0.7em; color: #888; margin-top: 8px; min-height: 1em; }

        /* Session Overlay */
        #freezeLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: none; z-index: 9999;
            opacity: 0; transition: opacity 0.3s ease-in-out;
            color: white; text-align: center; flex-direction: column;
            justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
        body.freeze { overflow: hidden; }
        body.sessionExpired #freezeLayer { display: flex; opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <div id="freezeLayer">
        Session expired, please login
        <button onclick="window.location.href='https://plasmastarstudios.github.io/pssweb/Account/Consumer/login/'" style="margin-top: 20px; padding: 10px 20px; background: #ff4444; border: none; border-radius: 8px; cursor: pointer; color: white;">Go to Login</button>
    </div>

    <div class="content-wrapper" id="MainWrapper">
        <div class="settings-link-container">
            <a href="https://plasmastarstudios.github.io/pssweb/Account/Consumer/settings/">Settings ⚙️</a> &nbsp;&nbsp; 
            <a href="https://plasmastarstudios.github.io/pssweb/Account/Consumer/logout">Logout</a>
        </div>

        <div style="background-color: darkgray; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 40px;" id="profile">
            <p style="color: black;">Loading profile...</p>
        </div>

        <section class="snippet-container">
            <div class="snippet-header">🛍️ Orders</div>
            <p style="color: #aaa;">Our order/payment system is temporarily unavailable.</p>
        </section>

        <section class="snippet-container">
            <div class="snippet-header">📺 Your Subscriptions</div>
            <div class="card-container" id="cardContainer">
                <p style="color: #666;">Checking subscriptions...</p>
            </div>
        </section>
    </div>

    <script>
        emailjs.init("YOUR_USER_ID"); // Use your EmailJS ID

        const MOCKAPI_USERDATA = "https://670968a0af1a3998baa16e22.mockapi.io/pspninf/personalaccounts";
        const MOCKAPI_URL = "https://67b8bf64699a8a7baef5211c.mockapi.io/EMAILSUBSCRIPTIONS/1";

        const firebaseConfig = {
            apiKey: "AIzaSyBnUk38Kg2J0-_rHHnUSgi4ii9wkiihVHs",
            authDomain: "personal-accouts.firebaseapp.com",
            projectId: "personal-accouts",
            storageBucket: "personal-accouts.firebasestorage.app",
            messagingSenderId: "190954179485",
            appId: "1:190954179485:web:ca7dec861890a6470c7d74"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const storedUserId = localStorage.getItem("CurrentLoggedInUSERID");

        const subscriptionsList = {
            "IIFPP": { name: "IIFPP", image: "https://github.com/PlasmaStarStudios/pssweb/blob/main/Account/Consumer/iifppbanner.png?raw=true" },
            "RRP": { name: "RRP", image: "https://github.com/PlasmaStarStudios/pssweb/blob/main/Account/Consumer/rripbanner.png?raw=true" }
        };

        function checkSession() {
            if (!storedUserId) { document.body.classList.add('sessionExpired', 'freeze'); return; }
            auth.onAuthStateChanged(user => {
                if (user && user.uid === storedUserId) { fetchUserData(); } 
                else { document.body.classList.add('sessionExpired', 'freeze'); }
            });
        }

        async function fetchUserData() {
            try {
                const response = await fetch(MOCKAPI_USERDATA);
                const data = await response.json();
                const userData = data.find(user => user.UserID === storedUserId);

                if (userData) {
                    document.getElementById('profile').innerHTML = `
                        <p style="color: black;"><strong>UserName:</strong> ${userData.ProfileName}</p>
                        <p style="color: black;"><strong>Gender:</strong> ${userData.Gender}</p>
                        <p style="color: black;"><strong>Age:</strong> ${userData.Age}</p>
                        <p style="color: black;"><strong>Contact Email:</strong> ${userData.contactemail}</p>
                    `;
                    displayCards(userData.Subscriptions, userData.contactemail);
                }
            } catch (error) { console.error("Error:", error); }
        }

        function displayCards(subscriptionsString, email) {
            const container = document.getElementById("cardContainer");
            container.innerHTML = "";
            let userSubs = subscriptionsString ? subscriptionsString.split(/,\s*/) : [];

            userSubs.forEach(subKey => {
                if (subscriptionsList[subKey]) {
                    const { name, image } = subscriptionsList[subKey];
                    const card = document.createElement("div");
                    card.classList.add("card");
                    card.innerHTML = `
                        <img src="${image}" alt="${name}">
                        <div class="card-body">
                            <h3>${name} Notifications</h3>
                            <div class="sub-btn-group">
                                <button class="sub-btn" onclick="updatePref('${subKey}', 'EVERYTHING', '${email}', this)">Notify: Everything</button>
                                <button class="sub-btn" onclick="updatePref('${subKey}', 'RELEASES', '${email}', this)">Notify: Only Releases</button>
                                <button class="sub-btn unsubscribe" onclick="updatePref('${subKey}', 'NONE', '${email}', this)">Unsubscribe</button>
                            </div>
                            <p class="status-text" id="status-${subKey}">Status: Active</p>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        async function updatePref(subKey, type, email, btn) {
            const statusBox = document.getElementById(`status-${subKey}`);
            statusBox.innerText = "Processing...";
            
            try {
                const response = await fetch(MOCKAPI_URL);
                let data = await response.json();

                let everythingList = data[`${subKey}_EVERYTHING`] ? data[`${subKey}_EVERYTHING`].split(", ").filter(e => e !== email) : [];
                let releasesList = data[`${subKey}_RELEASES`] ? data[`${subKey}_RELEASES`].split(", ").filter(e => e !== email) : [];

                if (type === "EVERYTHING") everythingList.push(email);
                if (type === "RELEASES") releasesList.push(email);

                const updatedData = {
                    ...data,
                    [`${subKey}_EVERYTHING`]: everythingList.join(", "),
                    [`${subKey}_RELEASES`]: releasesList.join(", ")
                };

                const putRes = await fetch(MOCKAPI_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedData)
                });

                if (putRes.ok) {
                    statusBox.innerText = "Settings updated!";
                    if (type !== "NONE") {
                        emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
                            to_email: email,
                            message: `Subscription updated for ${subKey} to: ${type}`
                        });
                    }
                }
            } catch (err) { statusBox.innerText = "Error saving preference."; }
        }

        checkSession();
    </script>
    <script src="../../topbar.js"></script>
</body>
</html>
