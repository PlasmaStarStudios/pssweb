<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Account | PlasmaStarStudios</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Shared UI Theme */
        body { background-color: #1a1a1a; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .content-wrapper { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        /* Settings/Logout Links */
        .settings-link-container { text-align: right; margin-bottom: 10px; }
        .settings-link-container a { color: #b366ff; text-decoration: none; font-size: 0.9em; font-weight: bold; }
        .settings-link-container a:hover { text-decoration: underline; }

        /* Container Styling */
        .snippet-container {
            background-color: #262626;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 5px solid #722a9e;
        }
        .snippet-header {
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            color: #b366ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        /* Subscription Card Styling */
        .card-container { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 20px; }
        .card {
            background: #333; border-radius: 8px; padding: 15px; width: 280px;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            border: 1px solid #444; text-align: center;
        }
        .card:hover { transform: scale(1.03); background: #3d3d3d; }
        .card img { width: 100%; border-radius: 6px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0 5px 0; color: #b366ff; }
        .card p { font-size: 0.8em; color: #aaa; }

        /* Session Overlay Styles */
        #freezeLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: none; z-index: 9999;
            opacity: 0; transition: opacity 0.3s ease-in-out;
            color: white; text-align: center; flex-direction: column;
            justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
        body.freeze { overflow: hidden; }
        body.sessionExpired #freezeLayer { display: flex; opacity: 1; pointer-events: all; }
        #redirectButton {
            margin-top: 20px; padding: 10px 20px; font-size: 18px; font-weight: bold;
            border: none; background-color: #ff4444; color: white; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="freezeLayer">
        Session expired, please login
        <button id="redirectButton">Go to Login</button>
    </div>

    <div id="topbar-placeholder"></div>
    <script src="../../topbar.js"></script>

    <div class="content-wrapper" id="MainWrapper">

        <div class="settings-link-container">
            <a href="https://example.com">Settings ⚙️</a> &nbsp;&nbsp; 
            <a href="https://www.plasmastarstudios.com/-5/personal">Logout</a>
        </div>

        <div style="background-color: darkgray; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 40px;" id="profile">
            <p style="color: black;">Loading profile...</p>
        </div>

        <section class="snippet-container">
            <div class="snippet-header">🛍️ Orders</div>
            <p style="color: #aaa;">Our order/payment system is temporarily unavailable.</p>
        </section>

        <section class="snippet-container">
            <div class="snippet-header">📺 Your Subscriptions</div>
            <div class="card-container" id="cardContainer">
                <p style="color: #666;">Checking subscriptions...</p>
            </div>
        </section>

    </div>

    <script>
        // --- Firebase Config & Session Check ---
        const firebaseConfig = {
            apiKey: "AIzaSyBnUk38Kg2J0-_rHHnUSgi4ii9wkiihVHs",
            authDomain: "personal-accouts.firebaseapp.com",
            projectId: "personal-accouts",
            storageBucket: "personal-accouts.firebasestorage.app",
            messagingSenderId: "190954179485",
            appId: "1:190954179485:web:ca7dec861890a6470c7d74"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const storedUserId = localStorage.getItem("CurrentLoggedInUSERID");

        const subscriptionsList = {
            "IIFPP": {
                name: "IIFPP",
                image: "https://primary.jwwb.nl/public/u/j/v/temp-dewdclfioztzpmzoaheg/robloxscreenshot20230714_133815954-high-6nn3k7.png?enable-io=true&enable=upscale&crop=1920%2C1039%2Cx0%2Cy21%2Csafe&width=1030&height=557",
                link: "https://www.plasmastarstudios.com/-5/personalacctemplate/subscriptions/hkaw-gawhgiwagwag-awghawg"
            },
            "RRP": {
                name: "RRP",
                image: "https://primary.jwwb.nl/public/u/j/v/temp-dewdclfioztzpmzoaheg/robloxscreenshot20241207_180422502-high-a1e2af.png?enable-io=true&enable=upscale&crop=1328%2C719%2Cx0%2Cy0%2Csafe&width=1030&height=557",
                link: "https://www.plasmastarstudios.com/-5/personalacctemplate/subscriptions/giwaha-asiowratysg-hawigjawh"
            }
        };

        function checkSession() {
            if (!storedUserId) { displayOfflineState(); return; }
            auth.onAuthStateChanged(user => {
                if (user && user.uid === storedUserId) { 
                    hideOfflineState();
                    fetchUserData(); 
                } else { displayOfflineState(); }
            });
        }

        function displayOfflineState() { document.body.classList.add('sessionExpired', 'freeze'); }
        function hideOfflineState() { document.body.classList.remove('sessionExpired', 'freeze'); }

        document.getElementById("redirectButton").addEventListener("click", () => {
            window.open("https://www.plasmastarstudios.com/-5/personal", "_blank");
        });

        // --- Fetch Profile & Subscriptions ---
        async function fetchUserData() {
            try {
                const response = await fetch('https://670968a0af1a3998baa16e22.mockapi.io/pspninf/personalaccounts');
                const data = await response.json();
                const userData = data.find(user => user.UserID === storedUserId);

                if (userData) {
                    // Update Profile
                    document.getElementById('profile').innerHTML = `
                        <p style="color: black;"><strong>UserName:</strong> ${userData.ProfileName}</p>
                        <p style="color: black;"><strong>Gender:</strong> ${userData.Gender}</p>
                        <p style="color: black;"><strong>Age:</strong> ${userData.Age}</p>
                        <p style="color: black;"><strong>Contact Email:</strong> ${userData.contactemail}</p>
                    `;

                    // Update Subscriptions
                    if (userData.Subscriptions) {
                        displayCards(userData.Subscriptions);
                    } else {
                        document.getElementById("cardContainer").innerHTML = "<p style='color: #666;'>No active subscriptions.</p>";
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('profile').innerHTML = "<p style='color: black;'>Error loading data.</p>";
            }
        }

        function displayCards(subscriptionsString) {
            const container = document.getElementById("cardContainer");
            container.innerHTML = "";

            let userSubs = subscriptionsString.split(/,\s*/);
            let foundAny = false;

            userSubs.forEach(subKey => {
                if (subscriptionsList[subKey]) {
                    foundAny = true;
                    const { name, image, link } = subscriptionsList[subKey];
                    const card = document.createElement("div");
                    card.classList.add("card");
                    card.innerHTML = `
                        <img src="${image}" alt="${name}">
                        <h3>${name}</h3>
                        <p>Click to access portal</p>
                    `;
                    card.onclick = () => window.location.href = link;
                    container.appendChild(card);
                }
            });

            if (!foundAny) {
                container.innerHTML = "<p style='color: #666;'>No active subscriptions found.</p>";
            }
        }

        checkSession();
    </script>
</body>
</html>
