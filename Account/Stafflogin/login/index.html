<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - PlasmaStarStudios</title>
    <style>
        body {
            margin: 0;
            background-color: #202020;
            color: #ffffff;
            font-family: "Calibri", sans-serif;
        }

        /* 1. HERO AREA (Matches your other pages) */
        .hero-banner {
            width: 100%;
            height: 300px;
            background-image: url('banner.jpg'); /* Local banner image */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid #722a9e;
        }

        .hero-text h1 { font-size: 3em; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* 2. MAIN CONTAINER */
        .content-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -50px;
        }

        .main-box {
            background-color: #262626;
            width: 90%;
            max-width: 800px; /* Slimmer for a login page */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: left;
        }

        /* 3. LOGIN UI ELEMENTS */
        #statusTitle {
            visibility: hidden;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #b366ff;
        }

        #progressContainer {
            width: 100%;
            background-color: #1a1a1a;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            visibility: hidden;
            border: 1px solid #444;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background-color: #722a9e; /* Purple instead of green to match brand */
            transition: width 1s ease-in-out, background-color 0.5s ease-in-out;
        }

        .login-btn {
            background-color: #722a9e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            transition: 0.3s;
        }

        .login-btn:hover { background-color: #8e3bc4; }
        .login-btn.disabled { background-color: #444; cursor: not-allowed; }

        .error-text { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <script src="topbar.js"></script>

    <div class="hero-banner">
        <div class="hero-text"><h1>STAFF PORTAL</h1></div>
    </div>

    <div class="content-wrapper">
        <div class="main-box" id="mainBox">
            <h2>Authentication Required</h2>
            <p>Access to the P.A.N.E.L. and staff resources requires a verified employee account.</p>
            <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

            <div id="statusTitle">Authenticating...</div>
            
            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>

            <button id="loginButton" class="login-btn" onclick="startAnimation()">Login</button>
        </div>
    </div>

    <script>
        /* --- PART 1: AUTO-CHECK LOGIC (Runs on Load) --- */
(async function() {
    const userId = localStorage.getItem("CurrentLoggedInUSERID");
    if (!userId) {
        localStorage.setItem("CurrentLoggedInUSERID", "nill");
    } else if (userId !== "nill") {
        try {
            const response = await fetch("https://670968a0af1a3998baa16e22.mockapi.io/pspninf/inf");
            const data = await response.json();
            const userRecord = data.find(record => record.UserID === userId);
            if (userRecord && userRecord.Banned === true) {
                window.location.href = "https://plasmastarstudios.com/ban";
            }
        } catch (e) { console.error("Ban check failed", e); }
    }
})();

/* --- PART 2: LOGIN ANIMATION & WINDOW MONITORING --- */
let loginWindow = null;
let authCheckInterval = null;

function startAnimation() {
    // Reset status
    localStorage.setItem("localpssauthreturned", "false");

    const btn = document.getElementById('loginButton');
    const status = document.getElementById('statusTitle');
    const container = document.getElementById('progressContainer');
    const bar = document.getElementById('progressBar');

    btn.classList.add('disabled');
    btn.disabled = true;
    status.style.visibility = 'visible';
    container.style.visibility = 'visible';

    // Start initial 5% progress
    setTimeout(() => {
        bar.style.width = '5%';
        openWindow();
        startMonitoring();
    }, 500);
}

function openWindow() {
    const w = 800, h = 600;
    const left = (window.screen.width / 2) - (w / 2);
    const top = (window.screen.height / 2) - (h / 2);

    loginWindow = window.open(
        "https://plasmastarstudios.github.io/pssweb/Account/Stafflogin/login/auth", // Make sure this points to your new auth page
        "PSS Login",
        `width=${w},height=${h},left=${left},top=${top}`
    );
}

function startMonitoring() {
    const bar = document.getElementById('progressBar');
    
    authCheckInterval = setInterval(() => {
        const authStatus = localStorage.getItem("localpssauthreturned");

        // SUCCESS: Auth window set status to true
        if (authStatus === "true") {
            clearInterval(authCheckInterval);
            bar.style.width = '100%';
            bar.style.backgroundColor = '#722a9e'; // Stay Purple
            
            setTimeout(() => {
                window.location.href = "https://plasmastarstudios.github.io/pssweb/Account/Stafflogin";
            }, 1000);
        } 
        
        // FAILURE: Window was closed without success
        else if (loginWindow && loginWindow.closed) {
            clearInterval(authCheckInterval);
            
            // Turn bar red and fill it to show the error
            bar.style.transition = "width 0.5s, background-color 0.5s";
            bar.style.width = '100%';
            bar.style.backgroundColor = 'red';
            
            document.getElementById('statusTitle').innerText = "Authentication Failed / Window Closed";
            document.getElementById('statusTitle').style.color = "red";

            setTimeout(() => {
                location.reload(); // Refresh as requested
            }, 2000);
        }
    }, 500);
}
    </script>
<script src="../../../topbar.js"></script>
</body>
</html>
