<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Account | PlasmaStarStudios</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Modern Dark Theme Adjustments */
        body { background-color: #1a1a1a; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .content-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Error Container Styling */
        .error-container {
            background-color: #262626;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 5px solid #c0392b; /* Red accent for errors */
        }
        .error-header {
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Settings Link Styling */
        .settings-link-container {
            text-align: right;
            margin-bottom: 10px;
        }
        .settings-link-container a {
            color: #b366ff;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
        }
        .settings-link-container a:hover { text-decoration: underline; }

        .snippet-container {
            background-color: #262626;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 5px solid #722a9e;
        }

        .snippet-header {
            border-bottom: 1px solid #444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            color: #b366ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        /* Legacy Playlist Specific Styles */
        .video-container { position: relative; margin-bottom: 20px; }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 560px;
            height: 315px;
            background-color: rgba(0, 0, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none; 
        }
        .video-overlay img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .video-overlay .title {
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            z-index: 2;
        }
        .toggle-button { padding: 10px 20px; border: none; color: white; cursor: pointer; border-radius: 5px; }
        .toggle-on { background-color: #4CAF50; }
        .toggle-off { background-color: #f44336; }
        
        /* Email System Specific Adjustments */
        .email-system input, .email-system textarea {
            background: #1a1a1a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box;
        }
        .email-system button { background: #722a9e; border: none; transition: 0.3s; padding: 10px 20px; color: white; cursor: pointer; border-radius: 4px; }
        .email-system button:hover { background: #8e3bc4; }
        
        iframe { border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <div id="topbar-placeholder"></div>
    <script src="../../topbar.js"></script>

    <div class="content-wrapper" id="MainContentWrapper">

        <div id="auth-status-check"></div>
        
        <div class="settings-link-container">
            <a href="https://plasmastarstudios.github.io/pssweb/Account/Stafflogin/settings/">Settings ⚙️</a> &nbsp;&nbsp; <a href="https://plasmastarstudios.github.io/pssweb/Account/Stafflogin/logout">Logout</a>
        </div>

        <div style="background-color: darkgray; padding: 20px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 40px;" id="profile">
            <p style="color: black;">Loading profile...</p>
        </div>

        <section class="snippet-container" id="section-job">
            <div class="snippet-header">💼 Job Essentials</div>
            <iframe id="job-embed-frame" src="" width="100%" height="500px" frameborder="0" style="display:none;"></iframe>
            <div id="job-message" style="display:none; padding: 20px; background: rgba(114, 42, 158, 0.1); border-radius: 8px;"></div>
        </section>

        <section class="snippet-container" id="section-agenda">
            <div class="snippet-header">📅 Schedule & Agenda</div>
            <iframe id="embed-frame" src="" width="100%" height="600px" frameborder="0"></iframe>
        </section>

        <section class="snippet-container email-system" id="section-mail">
            <div class="snippet-header">✉️ Internal Mail</div>
            
            <div class="mail-compose">
                <h3>Send a Message</h3>
                <form id="messageForm">
                    <label>Recipient Email:</label>
                    <input type="text" id="userEmail" placeholder="user@plasmastarstudios.com" required>
                    <label style="display:block; margin-top:10px;">Subject:</label>
                    <input type="text" id="subject" required>
                    <label style="display:block; margin-top:10px;">Message:</label>
                    <textarea id="message" rows="4" required></textarea>
                    <button type="submit" style="margin-top:10px;">Send Message</button>
                </form>
            </div>

            <hr style="border:0; border-top:1px solid #444; margin:30px 0;">

            <div class="mail-inbox">
                <h3>Inbox</h3>
                <ul id="subjectList" style="list-style:none; padding:0;"></ul>
                <div id="messageDetails" style="display:none;">
                    <h4>Message Details</h4>
                    <textarea id="messageText" readonly style="width:100%; height:150px;"></textarea>
                    <p id="senderLabel" style="font-style:italic; color:#aaa;"></p>
                    <button id="replyButton">Reply</button>
                    <button id="deleteButton" style="background:#c0392b;">Delete</button>
                    <button id="backButton" style="background:#555;">Back</button>
                </div>
            </div>
        </section>

        <section class="snippet-container" id="section-playlist">
            <div class="snippet-header">🎵 Media Playlist</div>
            <div style="margin-bottom: 20px;">
                <input type="text" id="videoInput" placeholder="Enter YouTube Video URL" style="padding: 10px; width: 300px; background:#1a1a1a; color:white; border:1px solid #444;">
                <button onclick="addVideo()" style="padding: 10px 20px; background:#722a9e; color:white; border:none; cursor:pointer;">Add Video</button>
            </div>

            <h2 id="playlistTitle" style="color: #b366ff;">Your Playlist (0/10)</h2>
            
            <div id="videoList">
                </div>

            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="loadVideos()" style="padding: 10px 20px; background:#444; color:white; border:none; cursor:pointer;">Load Videos</button>
                <button id="loopToggleButton" class="toggle-button toggle-off" onclick="toggleLoop()">Loop Off</button>
                <button id="privacyToggleButton" class="toggle-button toggle-off" onclick="togglePrivacy()">Privacy Off</button>
            </div>
        </section>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CURRENT_USER_ID = localStorage.getItem('CurrentLoggedInUSERID');
        const tableIdentifier = localStorage.getItem('CurrentLoggedInUSERID');
        const apiUrl = 'https://670968a0af1a3998baa16e22.mockapi.io/pspninf/inf';
        
        if (!tableIdentifier || tableIdentifier === "nul") {
            const wrapper = document.getElementById('MainContentWrapper');
            wrapper.innerHTML = `
                <div class="error-container">
                    <div class="error-header">⚠️ Error Message</div>
                    <p style="color: #ccc;">failure Could not find logged in user ID</p>
                    <p style="color: #888; font-size: 0.9em;">(This could be because you logged out recently)</p>
                </div>
            `;
            // Stop further script execution
            throw new Error("User not logged in.");
        }

        // --- 0. Account Info Logic ---
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const profileData = data.find(profile => profile.UserID === tableIdentifier);
                if (profileData) {
                    const profileInfo = `
                        <p style="color: black;"><strong>UserName:</strong> ${profileData.ProfileName}</p>
                        <p style="color: black;"><strong>Gender:</strong> ${profileData.Gender}</p>
                        <p style="color: black;"><strong>Age:</strong> ${profileData.Age}</p>
                        <p style="color: black;"><strong>Job:</strong> ${profileData.Job}</p>
                        <p style="color: black;"><strong>Contact Email:</strong> ${profileData.contactemail}</p>
                    `;
                    document.getElementById('profile').innerHTML = profileInfo;
                    initWorkAndAgenda(profileData);
                    initMail(profileData.ProfileName);
                }
            });

        // --- Shared Logic for Job/Agenda/Mail ---
        async function initWorkAndAgenda() {
            try {
                const response = await fetch('https://670968a0af1a3998baa16e22.mockapi.io/pspninf/inf');
                const data = await response.json();
                const user = data.find(entry => entry.UserID === CURRENT_USER_ID);
                if (user) {
                    document.getElementById('embed-frame').src = user.agendaurl || '';
                    const job = user.Job ? user.Job.toLowerCase() : "";
                    const jobMap = {
                        "management": "https://www.plasmastarstudios.com/-1/stafflogin/embedables/management",
                        "musiccomposter": "https://www.plasmastarstudios.com/-5/work/stafflogin/embedables/musiccomposter"
                    };
                    if (jobMap[job]) {
                        document.getElementById('job-embed-frame').src = jobMap[job];
                        document.getElementById('job-embed-frame').style.display = 'block';
                    } else {
                        document.getElementById('job-message').textContent = `Position: ${user.Job || 'Staff'}. No specific Job Essentials required.`;
                        document.getElementById('job-message').style.display = 'block';
                    }
                }
            } catch (e) { console.error(e); }
        }

        let USER_MAIL_ADDR = '';
        async function initMail() {
            if (!CURRENT_USER_ID) return;
            const res = await fetch(`https://670968a0af1a3998baa16e22.mockapi.io/pspninf/inf?UserID=${CURRENT_USER_ID}`);
            const data = await res.json();
            if (data.length > 0) {
                USER_MAIL_ADDR = `${data[0].ProfileName}@plasmastarstudios.com`;
                loadInbox();
            }
        }

        async function loadInbox() {
            const res = await fetch('https://66bccc7b24da2de7ff6be138.mockapi.io/EMAILINBOX');
            const data = await res.json();
            const messageData = data.filter(item => item.USEREMAIL.includes(USER_MAIL_ADDR));
            const list = document.getElementById('subjectList');
            list.innerHTML = '';
            messageData.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="showMessageDetails('${item.MESSAGE.replace(/\n/g, ' ')}', '${item.SENDER}', '${item.id}', '${item.SUBJECT}')" style="width:100%; text-align:left; padding:10px; margin-bottom:5px; background:#333; color:white; border:1px solid #444; cursor:pointer;">${item.SUBJECT}</button>`;
                list.appendChild(li);
            });
        }

        function showMessageDetails(msg, sender, id, subject) {
            document.getElementById('messageText').value = msg;
            document.getElementById('senderLabel').textContent = `From: ${sender}`;
            document.getElementById('messageDetails').style.display = 'block';
            document.getElementById('subjectList').style.display = 'none';
            document.getElementById('deleteButton').onclick = async () => {
                await fetch(`https://66bccc7b24da2de7ff6be138.mockapi.io/EMAILINBOX/${id}`, { method: 'DELETE' });
                loadInbox();
                document.getElementById('messageDetails').style.display = 'none';
                document.getElementById('subjectList').style.display = 'block';
            };
        }

        document.getElementById('backButton').onclick = () => {
            document.getElementById('messageDetails').style.display = 'none';
            document.getElementById('subjectList').style.display = 'block';
        };

        document.getElementById('messageForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('https://66bccc7b24da2de7ff6be138.mockapi.io/EMAILINBOX', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    SENDER: USER_MAIL_ADDR,
                    SUBJECT: document.getElementById('subject').value,
                    MESSAGE: document.getElementById('message').value,
                    USEREMAIL: document.getElementById('userEmail').value
                })
            });
            alert("Sent!");
            loadInbox();
        };

        // --- EXACT LEGACY PLAYLIST CODE START ---
        const baseURL = 'https://6670255a0900b5f87249953b.mockapi.io/API/Videos';
        let loopEnabled = false;
        let privacyEnabled = false;
        let players = [];

        function onYouTubeIframeAPIReady() { console.log("YouTube API Ready"); }

        async function addVideo() {
            const videoUrl = document.getElementById('videoInput').value.trim();
            if (!videoUrl) return;
            try {
                const response = await fetch(baseURL);
                const videos = await response.json();
                const userVideos = videos.filter(video => video.accountName === CURRENT_USER_ID);
                if (userVideos.length >= 10) { alert('Limit reached: 10 videos max.'); return; }
                if (isValidYouTubeUrl(videoUrl)) {
                    const videoId = extractVideoId(videoUrl);
                    const embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    await fetch(baseURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: embedUrl, accountName: CURRENT_USER_ID, customname: 'Unnamed' })
                    });
                    document.getElementById('videoInput').value = '';
                    alert('Video added. Click Load Videos to refresh.');
                } else { alert('Invalid YouTube URL.'); }
            } catch (error) { console.error('Error adding video:', error); }
        }

        async function loadVideos() {
            try {
                const response = await fetch(baseURL);
                const videos = await response.json();
                const userVideos = videos.filter(video => video.accountName === CURRENT_USER_ID);
                const playlistTitle = document.getElementById('playlistTitle');
                playlistTitle.textContent = `Your Playlist (${userVideos.length}/10)`;
                const videoList = document.getElementById('videoList');
                videoList.innerHTML = '';
                players.forEach(playerData => { if (playerData.player) playerData.player.destroy(); });
                players = [];
                userVideos.forEach(video => {
                    const videoId = extractVideoId(video.url);
                    const videoContainer = document.createElement('div');
                    videoContainer.className = 'video-container';
                    const videoWrapper = document.createElement('div');
                    videoWrapper.style.position = 'relative';
                    let overlay = null;
                    if (privacyEnabled) {
                        overlay = document.createElement('div');
                        overlay.className = 'video-overlay';
                        const gif = document.createElement('img');
                        gif.src = "https://plasmastarstudios.github.io/pssweb/Devs.PN/PANEL_PLAYLISTGIF.gif";
                        const title = document.createElement('div');
                        title.className = 'title';
                        title.textContent = video.customname || 'Unnamed Video';
                        overlay.appendChild(gif);
                        overlay.appendChild(title);
                        videoWrapper.appendChild(overlay);
                    }
                    const iframe = document.createElement('iframe');
                    iframe.width = "560";
                    iframe.height = "315";
                    iframe.src = `${video.url}?enablejsapi=1&autoplay=0&loop=${loopEnabled ? 1 : 0}&playlist=${videoId}`;
                    iframe.frameBorder = "0";
                    iframe.allow = "autoplay; encrypted-media";
                    iframe.allowFullscreen = true;
                    videoWrapper.appendChild(iframe);
                    const controls = document.createElement('div');
                    controls.style.marginTop = '10px';
                    controls.innerHTML = `
                        <button onclick="togglePlayPause('${videoId}', this)" data-video-id="${videoId}" style="padding:5px 15px;">Play</button>
                        <button onclick="renameVideo('${video.id}')" style="background:#007bff; color:white; border:none; padding:5px 10px; margin-left:5px;">Rename</button>
                        <button onclick="deleteVideo('${video.id}')" style="background:red; color:white; border:none; padding:5px 10px; margin-left:5px;">Delete</button>
                    `;
                    videoContainer.appendChild(videoWrapper);
                    videoContainer.appendChild(controls);
                    videoList.appendChild(videoContainer);
                    const player = new YT.Player(iframe, {
                        events: {
                            'onReady': (event) => { const pData = players.find(p => p.videoId === videoId); if (pData) pData.isReady = true; },
                            'onStateChange': (event) => handlePlayerStateChange(event, videoId, overlay)
                        }
                    });
                    players.push({ videoId: videoId, player: player, isReady: false, overlay: overlay });
                });
            } catch (error) { console.error('Error loading videos:', error); }
        }

        function handlePlayerStateChange(event, videoId, overlay) {
            const playButton = document.querySelector(`button[data-video-id="${videoId}"]`);
            if (event.data === YT.PlayerState.PLAYING) {
                if (playButton) playButton.textContent = 'Pause';
                if (overlay) overlay.querySelector('img').style.display = 'block';
            } else {
                if (playButton) playButton.textContent = 'Play';
                if (overlay) overlay.querySelector('img').style.display = 'none';
            }
        }

        function togglePlayPause(videoId, button) {
            const playerData = players.find(p => p.videoId === videoId);
            if (playerData && playerData.isReady) {
                const state = playerData.player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) { playerData.player.pauseVideo(); } 
                else { playerData.player.playVideo(); }
            }
        }

        async function renameVideo(id) {
            const newName = prompt('Enter a new name for the video:');
            if (newName) {
                await fetch(`${baseURL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customname: newName })
                });
                loadVideos();
            }
        }

        async function deleteVideo(id) {
            if (confirm('Are you sure you want to delete this video?')) {
                await fetch(`${baseURL}/${id}`, { method: 'DELETE' });
                loadVideos();
            }
        }

        function toggleLoop() {
            loopEnabled = !loopEnabled;
            const btn = document.getElementById('loopToggleButton');
            btn.className = loopEnabled ? 'toggle-button toggle-on' : 'toggle-button toggle-off';
            btn.textContent = loopEnabled ? 'Loop On' : 'Loop Off';
        }

        function togglePrivacy() {
            privacyEnabled = !privacyEnabled;
            const btn = document.getElementById('privacyToggleButton');
            btn.className = privacyEnabled ? 'toggle-button toggle-on' : 'toggle-button toggle-off';
            btn.textContent = privacyEnabled ? 'Privacy On' : 'Privacy Off';
        }

        function isValidYouTubeUrl(url) {
            const regex = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/;
            return regex.test(url);
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        window.onload = () => {
            initWorkAndAgenda();
            initMail();
            // loadVideos();
        };
    </script>
</body>
</html>
