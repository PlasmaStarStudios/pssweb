<section class="snippet-container" id="section-playlist">
    <div class="snippet-header">🎵 Media Playlist</div>
    
    <div class="playlist-controls" style="margin-bottom: 20px;">
        <input type="text" id="videoInput" placeholder="Enter YouTube Video URL" style="padding:10px; width:60%; background:#1a1a1a; border:1px solid #444; color:white; border-radius:4px;">
        <button type="button" onclick="addVideo()" style="padding:10px 20px; background:#722a9e; color:white; border:none; border-radius:4px; cursor:pointer;">Add</button>
    </div>

    <h2 id="playlistTitle" style="color: #b366ff;">Your Playlist (0/10)</h2>
    
    <div id="videoList" style="display: flex; flex-direction: column; gap:30px;">
        </div>

    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button type="button" onclick="loadVideos()" style="padding:10px; background:#444; color:white; border:none; cursor:pointer;">Load Videos</button>
        <button id="loopToggleButton" class="toggle-button toggle-off" onclick="toggleLoop()">Loop Off</button>
        <button id="privacyToggleButton" class="toggle-button toggle-off" onclick="togglePrivacy()">Privacy Off</button>
    </div>
</section>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const baseURL = 'https://6670255a0900b5f87249953b.mockapi.io/API/Videos';
    const ACCOUNTID = localStorage.getItem('CurrentLoggedInUSERID');
    let loopEnabled = false;
    let privacyEnabled = false;
    let players = [];

    // --- Legacy Playlist Functions ---

    function onYouTubeIframeAPIReady() {
        console.log("YouTube API Ready");
    }

    async function addVideo() {
        let videoUrl = document.getElementById('videoInput').value.trim();
        if (!videoUrl) return;

        try {
            const response = await fetch(baseURL);
            const videos = await response.json();
            const userVideos = videos.filter(v => v.accountName === ACCOUNTID);

            if (userVideos.length >= 10) {
                alert('Limit reached: 10 videos max.');
                return;
            }

            if (isValidYouTubeUrl(videoUrl)) {
                const videoId = extractVideoId(videoUrl);
                const embedUrl = `https://www.youtube.com/embed/${videoId}`;

                await fetch(baseURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: embedUrl, accountName: ACCOUNTID, customname: 'Unnamed' })
                });
                document.getElementById('videoInput').value = '';
                alert('Video added. Click Load Videos to refresh.');
            }
        } catch (error) { console.error(error); }
    }

    async function loadVideos() {
        try {
            const response = await fetch(baseURL);
            const videos = await response.json();
            const userVideos = videos.filter(v => v.accountName === ACCOUNTID);

            document.getElementById('playlistTitle').textContent = `Your Playlist (${userVideos.length}/10)`;
            const container = document.getElementById('videoList');
            container.innerHTML = '';

            // Cleanup old players
            players.forEach(p => { if(p.player) p.player.destroy(); });
            players = [];

            userVideos.forEach(video => {
                const videoId = extractVideoId(video.url);
                
                // Main Container
                const videoDiv = document.createElement('div');
                videoDiv.className = 'video-container';
                videoDiv.style.position = 'relative';

                // Overlay (Privacy GIF)
                let overlay = null;
                if (privacyEnabled) {
                    overlay = document.createElement('div');
                    overlay.className = 'video-overlay';
                    overlay.style.cssText = "position:absolute; background:#000; width:560px; height:315px; top:0; left:0; z-index:1; display:flex; justify-content:center; align-items:center; flex-direction:column;";
                    
                    const img = document.createElement('img');
                    img.src = "https://www.hondaofpasadena.com/assets/d405/img/img2/AudioVisualizer.gif";
                    img.style.cssText = "width:100%; height:100%; object-fit:cover; display:none;";
                    
                    const title = document.createElement('div');
                    title.className = 'title';
                    title.style.cssText = "color:white; font-size:24px; font-weight:bold; position:absolute; z-index:2;";
                    title.textContent = video.customname || 'Unnamed Video';

                    overlay.appendChild(img);
                    overlay.appendChild(title);
                    videoDiv.appendChild(overlay);
                }

                // Iframe
                const iframe = document.createElement('iframe');
                iframe.width = '560';
                iframe.height = '315';
                iframe.src = `${video.url}?enablejsapi=1&autoplay=0&loop=${loopEnabled ? 1 : 0}&playlist=${videoId}`;
                iframe.frameBorder = "0";
                
                // Buttons
                const btnContainer = document.createElement('div');
                btnContainer.style.marginTop = "10px";
                btnContainer.innerHTML = `
                    <button onclick="togglePlayPause('${videoId}', this)" data-video-id="${videoId}" style="padding:5px 15px;">Play</button>
                    <button onclick="renameVideo('${video.id}')" style="background:#007bff; color:white; border:none; padding:5px 10px; margin-left:5px;">Rename</button>
                    <button onclick="deleteVideo('${video.id}')" style="background:red; color:white; border:none; padding:5px 10px; margin-left:5px;">Delete</button>
                `;

                videoDiv.appendChild(iframe);
                videoDiv.appendChild(btnContainer);
                container.appendChild(videoDiv);

                const player = new YT.Player(iframe, {
                    events: {
                        'onReady': (e) => { 
                            const pData = players.find(p => p.videoId === videoId);
                            if(pData) pData.isReady = true;
                        },
                        'onStateChange': (e) => handlePlayerState(e, videoId, overlay)
                    }
                });

                players.push({
                    videoId: videoId,
                    player: player,
                    isReady: false,
                    overlayImg: overlay ? overlay.querySelector('img') : null
                });
            });
        } catch (e) { console.error(e); }
    }

    function handlePlayerState(event, videoId, overlay) {
        const btn = document.querySelector(`button[data-video-id="${videoId}"]`);
        const pData = players.find(p => p.videoId === videoId);

        if (pData && privacyEnabled && pData.overlayImg) {
            pData.overlayImg.style.display = (event.data === YT.PlayerState.PLAYING) ? 'block' : 'none';
        }

        if (btn) {
            btn.textContent = (event.data === YT.PlayerState.PLAYING) ? 'Pause' : 'Play';
        }
    }

    function togglePlayPause(videoId, btn) {
        const pData = players.find(p => p.videoId === videoId);
        if (pData && pData.isReady) {
            const state = pData.player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) pData.player.pauseVideo();
            else pData.player.playVideo();
        }
    }

    async function renameVideo(id) {
        const name = prompt('Enter new name:');
        if (name) {
            await fetch(`${baseURL}/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ customname: name })
            });
            loadVideos();
        }
    }

    async function deleteVideo(id) {
        if(confirm("Delete this video?")) {
            await fetch(`${baseURL}/${id}`, { method: 'DELETE' });
            loadVideos();
        }
    }

    function toggleLoop() {
        loopEnabled = !loopEnabled;
        const b = document.getElementById('loopToggleButton');
        b.className = loopEnabled ? 'toggle-button toggle-on' : 'toggle-button toggle-off';
        b.textContent = loopEnabled ? 'Loop On' : 'Loop Off';
    }

    function togglePrivacy() {
        privacyEnabled = !privacyEnabled;
        const b = document.getElementById('privacyToggleButton');
        b.className = privacyEnabled ? 'toggle-button toggle-on' : 'toggle-button toggle-off';
        b.textContent = privacyEnabled ? 'Privacy On' : 'Privacy Off';
        loadVideos(); // Privacy requires re-render for overlays
    }

    function isValidYouTubeUrl(url) {
        return (url.match(/^https:\/\/(?:www\.)?youtube(?:-nocookie)?\.com\/(?:embed\/|watch\?v=|v\/|.+\/)([^#\&\?]*).*/) !== null);
    }

    function extractVideoId(url) {
        const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^""&?\/\s]{11})/;
        const match = url.match(regex);
        return match ? match[1] : '';
    }
</script>
