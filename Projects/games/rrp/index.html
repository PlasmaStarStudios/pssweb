<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRP</title>

    <style>
        body {
            margin: 0;
            background-color: #202020;
            color: #ffffff;
            font-family: "Calibri", sans-serif;
        }

        /* 1. THE HERO BANNER AREA */
        .hero-banner {
            width: 100%;
            height: 400px; 
            /* Since image is in the SAME folder, just put the name here */
            background-image: url('banner.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid #722a9e;
        }

        .hero-text {
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* Subtle dark backing to make text pop */
            padding: 20px 40px;
            border-radius: 15px;
        }

        .hero-text h1 { font-size: 3.5em; margin: 0; color: rgb(255, 255, 255); }
        .hero-text h2 { font-size: 1.8em; margin: 10px 0 0; color: #b366ff; }

        /* 2. THE CONTENT WRAPPER */
        .content-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: -60px; /* The 'Legacy' overlap */
            position: relative;
            z-index: 10;
        }

        .main-box {
            background-color: #262626; 
            width: 95%;                
            max-width: 1400px;         
            padding: 40px;
            border-radius: 8px;        
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            min-height: 500px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <script src="../../../topbar.js"></script>

    <div class="hero-banner">
        <div class="hero-text">
            <h1>Rijen</h1>
            <h2>Roleplay</h2>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="main-box">
            <p style="text-align: center; font-size: 1.2em;">Rijen RP</p>
            <p style="text-align: center; font-size: 1.0em;">this is a side project that will be worked on when devs have spare time this might take years for this game to come out</p>
        </div>
    </div>

</body>
</html>
